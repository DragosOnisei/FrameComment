# ix_values.yaml — Default values used when the user has not overridden them
# in the install form.

timezone: Etc/UTC

adminEmail: admin@framecomment.local
adminPassword: ""
adminName: Admin

network:
  webPort: 30041

storage:
  uploads:
    type: ixVolume
    ixVolumeConfig:
      datasetName: uploads
  postgresData:
    type: ixVolume
    ixVolumeConfig:
      datasetName: postgres-data
  redisData:
    type: ixVolume
    ixVolumeConfig:
      datasetName: redis-data

secrets:
  postgresPassword: ""
  redisPassword: ""
  encryptionKey: ""
  jwtSecret: ""
  jwtRefreshSecret: ""
  shareTokenSecret: ""

s3:
  enabled: false
  endpoint: ""
  bucket: ""
  region: us-east-1
  accessKeyId: ""
  secretAccessKey: ""

resources:
  limits:
    cpu: "2000m"
    memory: "2Gi"

# 2.1.0+: NVIDIA GPU support for hardware-accelerated transcoding.
# When enabled, the worker container gets `runtime: nvidia` plus
# the standard NVIDIA_VISIBLE_DEVICES + NVIDIA_DRIVER_CAPABILITIES
# env vars so ffmpeg can use h264_nvenc / hevc_nvenc.
#
# Default ON because the typical FrameComment deployment is a home
# media / production server where GPU encoding is the whole point.
# Users without a GPU should disable this at install time — the
# question lives in questions.yaml under "Hardware Acceleration".
gpu:
  nvidia:
    enabled: true

# Image references (do not edit at install time — change via catalog upgrade).
images:
  app:
    repository: dragosonisei/framecomment
    tag: 2.1.3
    pullPolicy: IfNotPresent
  postgres:
    repository: postgres
    tag: 18-alpine
    pullPolicy: IfNotPresent
  redis:
    repository: redis
    tag: 8-alpine
    pullPolicy: IfNotPresent
