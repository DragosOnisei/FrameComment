name: framecomment
train: community
version: 2.0.0
app_version: 2.0.0
title: FrameComment
description: Self-hosted video review and approval platform for filmmakers and video professionals.
home: https://github.com/DragosOnisei/FrameComment
icon: https://raw.githubusercontent.com/DragosOnisei/FrameComment/main/truenas-catalog/community/framecomment/icon.png
sources:
  - https://github.com/DragosOnisei/FrameComment
  - https://hub.docker.com/r/dragosonisei/framecomment
maintainers:
  - email: dragosonisei@gmail.com
    name: Dragos Onisei
    url: https://github.com/DragosOnisei
keywords:
  - video
  - review
  - approval
  - filmmakers
  - self-hosted
annotations:
  title: FrameComment
lib_version: 2.1.0
lib_version_hash: aaaaaaaaaaaaaaaaaaaaaaaa
required_features:
  - normalize/ixVolume
  - definitions/timezone
  - definitions/nodePort
  - definitions/certificate
  - validations/nodePort
host_mounts: []
capabilities:
